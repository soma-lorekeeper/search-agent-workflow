<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>설정 오류 리포트</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a1a;
    --muted: #6b7280;
    --accent: #2563eb;
    --bad: #dc2626;
    --bad-bg: #fef2f2;
    --ok: #16a34a;
    --ok-bg: #f0fdf4;
    --unknown: #92720a;
    --unknown-bg: #fefbea;
    --code-bg: #f3f4f6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  #app { width: 100%; max-width: 820px; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header a {
    color: var(--muted);
    font-size: 12px;
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
  }
  header a:hover { color: var(--text); background: #f3f4f6; }
  main { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  input[type=text] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    margin-bottom: 12px;
  }
  textarea {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
  }
  .row { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
  .row input[type=file] { font-size: 12px; color: var(--muted); }
  button#run {
    border: none;
    background: var(--accent);
    color: white;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    margin-left: auto;
  }
  button#run:disabled { opacity: 0.5; cursor: default; }
  #status { font-size: 13px; color: var(--muted); margin-top: 8px; }
  #summary { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .claim {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .claim-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; }
  .cat { font-size: 11px; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px; }
  .badge { font-size: 12px; font-weight: 600; border-radius: 6px; padding: 3px 8px; white-space: nowrap; }
  .badge.contradiction { color: var(--bad); background: var(--bad-bg); }
  .badge.consistent { color: var(--ok); background: var(--ok-bg); }
  .badge.unknown { color: var(--unknown); background: var(--unknown-bg); }
  .field { font-size: 13px; line-height: 1.55; margin-top: 6px; }
  .field .k { color: var(--muted); font-size: 12px; display: block; margin-bottom: 1px; }
  .field p { margin: 0; }
  .field code {
    background: var(--code-bg);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.9em;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .field strong { font-weight: 700; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>설정 오류 리포트</h1>
    <a href="/">← Q&A로</a>
  </header>
  <main>
    <div class="panel">
      <label for="label">회차 라벨</label>
      <input type="text" id="label" placeholder="예: 7화 초안" value="신규 회차" />
      <label for="text">신규 회차 원고</label>
      <textarea id="text" placeholder="검사할 신규 회차 원고를 붙여넣거나, 아래에서 .txt 파일을 선택하세요"></textarea>
      <div class="row">
        <input type="file" id="file" accept=".txt" />
        <button id="run">검사하기</button>
      </div>
      <div id="status"></div>
    </div>
    <div id="results"></div>
  </main>
</div>

<script>
  // 외부 라이브러리 없이 처리하는 최소 마크다운 인라인 렌더러 (굵게/기울임/코드)
  function renderInline(text) {
    const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    let s = esc(text || "");
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, "$1<em>$2</em>");
    return `<p>${s}</p>`;
  }

  const textEl = document.getElementById("text");
  const labelEl = document.getElementById("label");
  const fileEl = document.getElementById("file");
  const runEl = document.getElementById("run");
  const statusEl = document.getElementById("status");
  const resultsEl = document.getElementById("results");

  const LABELS = {
    contradiction: "모순 있음",
    consistent: "모순 없음",
    unknown: "확인 불가",
  };

  fileEl.addEventListener("change", async () => {
    const file = fileEl.files[0];
    if (!file) return;
    textEl.value = await file.text();
  });

  function renderResults(data) {
    const results = data.results || [];
    const counts = { contradiction: 0, consistent: 0, unknown: 0 };
    for (const r of results) counts[r.label] = (counts[r.label] || 0) + 1;

    resultsEl.innerHTML = "";

    const summary = document.createElement("div");
    summary.id = "summary";
    summary.textContent =
      `검사한 서술 ${results.length}건 — 모순 ${counts.contradiction} / ` +
      `모순 없음 ${counts.consistent} / 확인 불가 ${counts.unknown}`;
    resultsEl.appendChild(summary);

    for (const r of results) {
      const div = document.createElement("div");
      div.className = "claim";

      const head = document.createElement("div");
      head.className = "claim-head";
      const cat = document.createElement("span");
      cat.className = "cat";
      cat.textContent = r.category || "기타";
      const badge = document.createElement("span");
      badge.className = "badge " + (r.label || "unknown");
      badge.textContent = LABELS[r.label] || r.label || "확인 불가";
      head.appendChild(cat);
      head.appendChild(badge);
      div.appendChild(head);

      const quote = document.createElement("div");
      quote.className = "field";
      const src = r.source_episode ? `${r.source_episode}화` : "-";
      quote.innerHTML =
        `<span class="k">추출된 서술 (질문)</span>${renderInline(r.quote)}`;
      div.appendChild(quote);

      const evidence = document.createElement("div");
      evidence.className = "field";
      evidence.innerHTML =
        `<span class="k">검색된 근거 (${src})</span>${renderInline(r.established_fact || "(근거 없음)")}`;
      div.appendChild(evidence);

      const explain = document.createElement("div");
      explain.className = "field";
      explain.innerHTML = `<span class="k">판단</span>${renderInline(r.explanation)}`;
      div.appendChild(explain);

      resultsEl.appendChild(div);
    }
  }

  async function run() {
    const text = textEl.value.trim();
    if (!text) {
      statusEl.textContent = "검사할 원고를 입력하세요.";
      return;
    }
    runEl.disabled = true;
    resultsEl.innerHTML = "";
    statusEl.textContent = "검사 중... (claim 수에 따라 수십 초~1분 이상 걸릴 수 있습니다)";

    try {
      const res = await fetch("/check_episode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, episode_label: labelEl.value.trim() || "신규 회차" }),
      });
      if (!res.ok) throw new Error("서버 오류: " + res.status);
      const data = await res.json();
      statusEl.textContent = "";
      renderResults(data);
    } catch (err) {
      statusEl.textContent = "오류가 발생했습니다: " + err.message;
    } finally {
      runEl.disabled = false;
    }
  }

  runEl.addEventListener("click", run);
</script>
</body>
</html>
