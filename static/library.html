<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>원고 목록 · 결</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --paper: #fbfaf7;
    --surface: #ffffff;
    --ink: #24211d;
    --ink-muted: #6b6355;
    --rule: #e7e2d6;
    --rule-strong: #d8d1c1;
    --mark-rose: #f2c9ce;
    --mark-sky: #c9dce6;
    --mark-sky-ink: #2c5266;
    --mark-sage: #cfe2c4;
    --mark-sage-ink: #3c5c30;
    --mark-butter: #f1e1a6;
    --accent: #8b3a46;
    --accent-ink: #ffffff;
    --font-display: "Noto Serif KR", serif;
    --font-body: "IBM Plex Sans KR", -apple-system, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.6;
  }
  a { color: inherit; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px 20px;
    padding: 22px 40px;
    border-bottom: 1px solid var(--rule);
  }
  .wordmark { display: flex; align-items: baseline; gap: 10px; }
  .wordmark .glyph { font-family: var(--font-display); font-weight: 700; font-size: 22px; }
  .wordmark .tagline { font-size: 12px; color: var(--ink-muted); }
  nav { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  nav a {
    text-decoration: none;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 8px;
    color: var(--ink-muted);
    transition: background 0.15s ease, color 0.15s ease;
  }
  nav a:hover { color: var(--ink); background: var(--surface); }
  nav a.active { color: var(--ink); background: var(--surface); border: 1px solid var(--rule); }

  .top {
    max-width: 1080px;
    margin: 0 auto;
    padding: 44px 24px 0;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 30px;
    line-height: 1.35;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  .lede { font-size: 14.5px; color: var(--ink-muted); max-width: 46em; margin: 0 0 32px; }

  .layout {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 24px 100px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    align-items: start;
  }

  .shelf {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    overflow: hidden;
  }
  .shelf-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-bottom: 1px solid var(--rule);
    padding: 14px 16px;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
  }
  .shelf-item:last-child { border-bottom: none; }
  .shelf-item:hover { background: #fdfbf9; }
  .shelf-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .shelf-item.active { background: #fff5f0; }
  .shelf-item.active .shelf-title { color: var(--accent); }
  .shelf-row1 { display: flex; align-items: center; gap: 8px; }
  .shelf-stamp {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 2px 6px;
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  .shelf-title { font-size: 13.5px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .shelf-meta { font-size: 11px; color: var(--ink-muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; padding-left: 2px; }
  .shelf-badge {
    display: inline-block;
    font-size: 10px;
    background: var(--mark-sage);
    color: var(--mark-sage-ink);
    border-radius: 5px;
    padding: 1px 6px;
    margin-left: 6px;
  }

  .reader {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 36px 44px 44px;
    min-height: 480px;
  }
  .reader-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
    flex-wrap: wrap;
  }
  .reader-stamp {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--mark-sky);
    color: var(--mark-sky-ink);
    border-radius: 6px;
    padding: 3px 8px;
  }
  .reader-info { font-size: 12px; color: var(--ink-muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; margin-left: auto; }
  .reader h2 {
    font-family: var(--font-display);
    font-size: 24px;
    margin: 0 0 22px;
  }
  .reader-body {
    font-size: 15.5px;
    line-height: 1.9;
    max-width: 62ch;
  }
  .reader-body p { margin: 0 0 1.1em; }
  .reader-note {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px dashed var(--rule);
    font-size: 12px;
    color: var(--ink-muted);
  }

  @media (max-width: 760px) {
    header { padding: 18px 20px; }
    .top { padding: 36px 18px 0; }
    .layout { grid-template-columns: 1fr; padding: 0 18px 80px; }
    h1 { font-size: 25px; }
    .reader { padding: 26px 22px 32px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">
    <span class="glyph">결</span>
    <span class="tagline">이야기의 결을 기억합니다</span>
  </div>
  <nav>
    <a href="/">원고 접수</a>
    <a href="/library" class="active">원고 목록</a>
    <a href="/report">정합성 리포트</a>
    <a href="/chat">Q&amp;A 챗봇</a>
  </nav>
</header>

<div class="top">
  <div class="eyebrow">03 · 원고 목록</div>
  <h1>지금까지 접수된 회차</h1>
  <p class="lede">
    접수된 회차를 선택하면 원문을 읽을 수 있습니다. 내용을 고치는 화면은 아니고,
    확인용 보기 전용입니다.
  </p>
</div>

<div class="layout">
  <div class="shelf" id="shelf"></div>
  <div class="reader" id="reader"></div>
</div>

<script>
  // ---- mock 데이터 (실제로는 접수된 원고 메타데이터 + 원문을 백엔드에서 가져올 자리) ----
  const EPISODES = [
    {
      ep: 1,
      title: "지하철의 마지막 페이지",
      uploaded: "2026-07-11",
      chars: 65721,
      body: [
        "김독자는 퇴근길 지하철 안에서, 십 년 넘게 혼자 읽어온 웹소설이 현실이 되는 순간을 맞는다. 화면 속 이야기가 아니라 눈앞의 승객들이 진짜로 첫 시나리오의 대상이 된 것이다.",
        "도깨비가 나타나 생명체를 해치라는 조건을 내걸자, 사람들은 서로를 향해 칼을 겨눈다. 김독자는 소설 속에서 읽었던 지식을 떠올려, 사람 대신 곤충과 메뚜기 알을 죽이는 방식으로 조건을 우회한다.",
        "직접 죽이지 않고도 살아남는 길이 있다는 걸 증명한 첫 순간이었다.",
      ],
    },
    {
      ep: 2,
      title: "한강의 배후",
      uploaded: "2026-07-11",
      chars: 72836,
      body: [
        "지하철이 동호대교 위에 멈춰 서고, 성좌와 배후성이라는 새로운 규칙이 승객들 앞에 모습을 드러낸다.",
        "김독자는 유중혁이라는, 원작 속 진짜 주인공과 처음으로 마주친다. 유중혁은 동료가 될 것을 제안하지만, 마지막 시험대에서 김독자를 놓아버리고 만다.",
        "모든 배후성의 제안을 거절한 채, 김독자는 한강의 괴수 어룡의 입속으로 떨어진다.",
      ],
    },
    {
      ep: 3,
      title: "뱃속에서 벌인 협상",
      uploaded: "2026-07-11",
      chars: 50144,
      body: [
        "어룡의 뱃속에서 눈을 뜬 김독자는 절망 대신 계산을 시작한다. 도깨비 비형과 접촉해 히든 시나리오를 제안받고, 스톤호그의 가시와 망치 해마의 점액을 이용해 나흘 만에 어룡을 안에서부터 무너뜨린다.",
        "탈출 직후 비형과 전속 스트림 계약을 맺으며, 김독자는 비로소 이 세계에서 자신만의 자리를 만들기 시작한다.",
      ],
    },
    {
      ep: 4,
      title: "금호역의 질서",
      uploaded: "2026-07-11",
      chars: 66426,
      body: [
        "지상은 이미 독안개로 뒤덮여 있었다. 금호역 지하로 내려간 김독자는 이현성, 유상아, 이길영과 재회하고, 천인호가 이끄는 철두파가 만들어 놓은 배급 질서와 마주한다.",
        "직접 죽이지 않고 무력화한다는 첫 시나리오의 원칙은 여기서도 그대로 이어진다. 능력치가 처음으로 공개되고, 생존자들 사이의 서열과 자원 다툼이 본격적으로 시작된다.",
      ],
    },
    {
      ep: 5,
      title: "어둠 자락의 대가",
      uploaded: "2026-07-11",
      chars: 66261,
      body: [
        "식량 문제를 풀기 위해 일행은 약수역 터널의 어둠 자락으로 향한다. 이길영이 낡은 강철 방패를 발견하고, 어둠 파수꾼과의 전투 중 한명오는 아스모데우스의 저주를 얻는다.",
        "다툼 끝에 한명오가 유상아의 자전거를 몰래 가져갔다는 사실도 이 화에서 처음 드러난다. 김독자는 전리품을 모아 상위 아이템 합성을 준비한다.",
      ],
    },
    {
      ep: 6,
      title: "부러지지 않는 신념",
      uploaded: "2026-07-11",
      chars: 70442,
      body: [
        "합성 끝에 김독자는 성유물급 검 '부러지지 않는 신념'을 얻는다. 금호역으로 돌아온 그는 천인호와 철두파의 악행을 낱낱이 폭로하고, 정희원은 전투 중 '멸악의 심판자'로 각성해 철두파를 도륙하며 천인호를 죽인다.",
        "이후 일행은 사명대사 동상을 부수고 다음 시나리오 거점인 충무로로 향하다, 그 입구에서 이지혜와 조우하며 이번 화는 끝난다.",
      ],
    },
  ];

  const shelfEl = document.getElementById("shelf");
  const readerEl = document.getElementById("reader");
  let activeEp = EPISODES[0].ep;

  function formatChars(n) {
    return n.toLocaleString("ko-KR") + "자";
  }

  function renderShelf() {
    shelfEl.innerHTML = "";
    EPISODES.forEach((e) => {
      const btn = document.createElement("button");
      btn.className = "shelf-item" + (e.ep === activeEp ? " active" : "");
      btn.innerHTML = `
        <div class="shelf-row1">
          <span class="shelf-stamp">${String(e.ep).padStart(2, "0")}화</span>
          <span class="shelf-title">${e.title}</span>
        </div>
        <div class="shelf-meta">${e.uploaded} · ${formatChars(e.chars)}<span class="shelf-badge">인덱싱 완료</span></div>
      `;
      btn.addEventListener("click", () => {
        activeEp = e.ep;
        renderShelf();
        renderReader();
      });
      shelfEl.appendChild(btn);
    });
  }

  function renderReader() {
    const e = EPISODES.find((x) => x.ep === activeEp);
    readerEl.innerHTML = `
      <div class="reader-meta">
        <span class="reader-stamp">${String(e.ep).padStart(2, "0")}화</span>
        <span class="reader-info">${e.uploaded} · ${formatChars(e.chars)}</span>
      </div>
      <h2>${e.title}</h2>
      <div class="reader-body">
        ${e.body.map((p) => `<p>${p}</p>`).join("")}
      </div>
      <div class="reader-note">
        실제 원고는 이보다 훨씬 길며, 이 화면은 확인용 발췌만 보여줍니다.
      </div>
    `;
  }

  renderShelf();
  renderReader();
</script>
</body>
</html>
