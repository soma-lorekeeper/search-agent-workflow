<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>소설 세계관 Q&A</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7f8;
    --panel: #ffffff;
    --border: #e3e3e6;
    --text: #1a1a1a;
    --muted: #7a7a80;
    --accent: #2563eb;
    --user-bubble: #2563eb;
    --user-text: #ffffff;
    --bot-bubble: #eef0f3;
    --bot-text: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --panel: #16181d;
      --border: #2a2d34;
      --text: #e8e8ea;
      --muted: #9a9aa2;
      --accent: #5b8cff;
      --user-bubble: #3b5fd9;
      --user-text: #ffffff;
      --bot-bubble: #232630;
      --bot-text: #e8e8ea;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header button {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  header button:hover { color: var(--text); }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    white-space: pre-wrap;
    line-height: 1.5;
    font-size: 14px;
  }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border-bottom-left-radius: 4px; }
  .msg.bot.pending .bubble { color: var(--muted); }
  #inputbar {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #inputbar textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    height: 44px;
  }
  #inputbar button {
    border: none;
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
  }
  #inputbar button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>소설 세계관 Q&A</h1>
    <button id="reset">새 대화</button>
  </header>
  <div id="messages"></div>
  <div id="inputbar">
    <textarea id="input" placeholder="소설 내용에 대해 물어보세요 (Shift+Enter 줄바꿈, Enter 전송)"></textarea>
    <button id="send">보내기</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendEl = document.getElementById("send");
  const resetEl = document.getElementById("reset");

  function getThreadId() {
    let id = localStorage.getItem("thread_id");
    if (!id) {
      id = crypto.randomUUID();
      localStorage.setItem("thread_id", id);
    }
    return id;
  }

  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = "msg " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    sendEl.disabled = true;
    addMessage("user", text);

    const pendingRow = document.createElement("div");
    pendingRow.className = "msg bot pending";
    const pendingBubble = document.createElement("div");
    pendingBubble.className = "bubble";
    pendingBubble.textContent = "생각 중...";
    pendingRow.appendChild(pendingBubble);
    messagesEl.appendChild(pendingRow);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, thread_id: getThreadId() }),
      });
      if (!res.ok) throw new Error("서버 오류: " + res.status);
      const data = await res.json();
      pendingRow.remove();
      addMessage("bot", data.answer);
    } catch (err) {
      pendingRow.remove();
      addMessage("bot", "오류가 발생했습니다: " + err.message);
    } finally {
      sendEl.disabled = false;
      inputEl.focus();
    }
  }

  sendEl.addEventListener("click", send);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  resetEl.addEventListener("click", () => {
    localStorage.removeItem("thread_id");
    messagesEl.innerHTML = "";
  });
</script>
</body>
</html>
