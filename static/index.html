<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>소설 세계관 Q&A</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a1a;
    --muted: #6b7280;
    --accent: #2563eb;
    --user-bubble: #2563eb;
    --user-text: #ffffff;
    --bot-bubble: #f3f4f6;
    --bot-text: #1a1a1a;
    --code-bg: #eef0f3;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .nav { display: flex; align-items: center; gap: 8px; }
  header a {
    color: var(--muted);
    font-size: 12px;
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
  }
  header a:hover { color: var(--text); background: var(--bot-bubble); }
  header button {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  header button:hover { color: var(--text); background: var(--bot-bubble); }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.55;
    font-size: 14px;
  }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; white-space: pre-wrap; }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border-bottom-left-radius: 4px; }
  .msg.bot.pending .bubble { color: var(--muted); }
  /* 마크다운 렌더링 스타일 */
  .bubble p { margin: 0 0 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble h1, .bubble h2, .bubble h3 { margin: 10px 0 6px; line-height: 1.3; }
  .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child { margin-top: 0; }
  .bubble h1 { font-size: 17px; }
  .bubble h2 { font-size: 16px; }
  .bubble h3 { font-size: 15px; }
  .bubble ul, .bubble ol { margin: 4px 0 8px; padding-left: 20px; }
  .bubble li { margin: 2px 0; }
  .bubble code {
    background: var(--code-bg);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.9em;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .bubble strong { font-weight: 700; }
  #inputbar {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #inputbar textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    height: 44px;
  }
  #inputbar button {
    border: none;
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
  }
  #inputbar button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>소설 세계관 Q&A</h1>
    <div class="nav">
      <a href="/check">설정 오류 리포트 →</a>
      <button id="reset">새 대화</button>
    </div>
  </header>
  <div id="messages"></div>
  <div id="inputbar">
    <textarea id="input" placeholder="소설 내용에 대해 물어보세요 (Shift+Enter 줄바꿈, Enter 전송)"></textarea>
    <button id="send">보내기</button>
  </div>
</div>

<script>
  // 외부 라이브러리 없이 처리하는 최소 마크다운 렌더러 (헤더/굵게/기울임/코드/목록/문단)
  function renderMarkdown(text) {
    const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const inline = (s) => {
      s = esc(s);
      s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
      s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      s = s.replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, "$1<em>$2</em>");
      return s;
    };

    let html = "";
    let listType = null;
    let para = [];

    const flushPara = () => {
      if (para.length) { html += "<p>" + para.join("<br>") + "</p>"; para = []; }
    };
    const closeList = () => {
      if (listType) { html += "</" + listType + ">"; listType = null; }
    };

    for (const raw of text.split("\n")) {
      const line = raw.trimEnd();
      const heading = line.match(/^(#{1,3})\s+(.*)/);
      const ulItem = line.match(/^[-*]\s+(.*)/);
      const olItem = line.match(/^\d+\.\s+(.*)/);

      if (!line.trim()) { flushPara(); closeList(); continue; }
      if (heading) {
        flushPara(); closeList();
        const level = heading[1].length;
        html += `<h${level}>${inline(heading[2])}</h${level}>`;
        continue;
      }
      if (ulItem) {
        flushPara();
        if (listType !== "ul") { closeList(); html += "<ul>"; listType = "ul"; }
        html += `<li>${inline(ulItem[1])}</li>`;
        continue;
      }
      if (olItem) {
        flushPara();
        if (listType !== "ol") { closeList(); html += "<ol>"; listType = "ol"; }
        html += `<li>${inline(olItem[1])}</li>`;
        continue;
      }
      closeList();
      para.push(inline(line));
    }
    flushPara();
    closeList();
    return html;
  }

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendEl = document.getElementById("send");
  const resetEl = document.getElementById("reset");

  function getThreadId() {
    let id = localStorage.getItem("thread_id");
    if (!id) {
      id = crypto.randomUUID();
      localStorage.setItem("thread_id", id);
    }
    return id;
  }

  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = "msg " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (role === "bot") {
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.textContent = text;
    }
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    sendEl.disabled = true;
    addMessage("user", text);

    const pendingRow = document.createElement("div");
    pendingRow.className = "msg bot pending";
    const pendingBubble = document.createElement("div");
    pendingBubble.className = "bubble";
    pendingBubble.textContent = "생각 중...";
    pendingRow.appendChild(pendingBubble);
    messagesEl.appendChild(pendingRow);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, thread_id: getThreadId() }),
      });
      if (!res.ok) throw new Error("서버 오류: " + res.status);
      const data = await res.json();
      pendingRow.remove();
      addMessage("bot", data.answer);
    } catch (err) {
      pendingRow.remove();
      addMessage("bot", "오류가 발생했습니다: " + err.message);
    } finally {
      sendEl.disabled = false;
      inputEl.focus();
    }
  }

  sendEl.addEventListener("click", send);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  resetEl.addEventListener("click", () => {
    localStorage.removeItem("thread_id");
    messagesEl.innerHTML = "";
  });
</script>
</body>
</html>
