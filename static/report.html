<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>정합성 리포트 · 결</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --paper: #fbfaf7;
    --surface: #ffffff;
    --ink: #24211d;
    --ink-muted: #6b6355;
    --rule: #e7e2d6;
    --rule-strong: #d8d1c1;
    --mark-rose: #f2c9ce;
    --mark-rose-ink: #7a2c35;
    --mark-sky: #c9dce6;
    --mark-sky-ink: #2c5266;
    --mark-sage: #cfe2c4;
    --mark-sage-ink: #3c5c30;
    --mark-butter: #f1e1a6;
    --mark-butter-ink: #7a611b;
    --accent: #8b3a46;
    --accent-ink: #ffffff;
    --font-display: "Noto Serif KR", serif;
    --font-body: "IBM Plex Sans KR", -apple-system, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.6;
  }
  a { color: inherit; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 40px;
    border-bottom: 1px solid var(--rule);
  }
  .wordmark { display: flex; align-items: baseline; gap: 10px; }
  .wordmark .glyph { font-family: var(--font-display); font-weight: 700; font-size: 22px; }
  .wordmark .tagline { font-size: 12px; color: var(--ink-muted); }
  nav { display: flex; gap: 4px; }
  nav a {
    text-decoration: none;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 8px;
    color: var(--ink-muted);
    transition: background 0.15s ease, color 0.15s ease;
  }
  nav a:hover { color: var(--ink); background: var(--surface); }
  nav a.active { color: var(--ink); background: var(--surface); border: 1px solid var(--rule); }

  main { max-width: 820px; margin: 0 auto; padding: 56px 24px 120px; }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 34px;
    line-height: 1.35;
    margin: 0 0 14px;
    letter-spacing: -0.01em;
  }
  .lede { font-size: 15px; color: var(--ink-muted); max-width: 46em; margin: 0 0 40px; }

  /* ---------- upload panel ---------- */
  .panel {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .panel .file-slot {
    flex: 1;
    min-width: 220px;
    border: 1.5px dashed var(--rule-strong);
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 13.5px;
    color: var(--ink-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .panel .file-slot:hover, .panel .file-slot.dragover { border-color: var(--accent); background: #fff9f6; }
  .panel .file-slot:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .panel .file-slot svg { width: 20px; height: 20px; flex-shrink: 0; }
  .panel .file-slot.has-file { color: var(--ink); border-style: solid; }
  .panel input[type=file] { display: none; }
  button.primary {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px;
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  button.primary:hover:not(:disabled) { opacity: 0.92; }
  button.primary:active:not(:disabled) { transform: translateY(1px); }
  button.primary:disabled { background: var(--rule-strong); cursor: not-allowed; }

  /* ---------- progress ---------- */
  .progress-wrap { margin-top: 28px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-track {
    height: 4px;
    background: var(--rule);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .progress-caption {
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* ---------- report ---------- */
  .report { margin-top: 44px; display: none; }
  .report.show { display: block; }
  .summary-strip {
    display: flex;
    gap: 22px;
    padding-bottom: 22px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--rule);
  }
  .summary-item .num { font-family: var(--font-mono); font-size: 26px; font-weight: 500; }
  .summary-item .label { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
  .summary-item.flag .num { color: var(--mark-rose-ink); }
  .summary-item.ok .num { color: var(--mark-sage-ink); }
  .summary-item.unk .num { color: var(--mark-butter-ink); }

  h2.section-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 16px;
  }

  .redline-card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 22px 22px 18px;
    margin-bottom: 18px;
    opacity: 0;
    transform: translateY(8px);
    animation: rise 0.4s ease forwards;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .redline-card:hover { box-shadow: 0 6px 20px -12px rgba(36, 33, 29, 0.25); transform: translateY(-1px); }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .rc-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .rc-tag {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 1px solid var(--rule-strong);
    border-radius: 6px;
    padding: 3px 8px;
    color: var(--ink-muted);
  }
  .rc-stamp {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--mark-rose-ink);
    margin-left: auto;
  }

  .rc-body {
    display: grid;
    grid-template-columns: 1fr 44px 1fr;
    align-items: stretch;
    gap: 0;
  }
  .rc-block { border-radius: 10px; padding: 14px 16px; }
  .rc-excerpt { background: #fdf3f4; }
  .rc-citation { background: #f2f7f9; }
  .rc-block .rc-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .rc-excerpt .rc-label { color: var(--mark-rose-ink); }
  .rc-citation .rc-label { color: var(--mark-sky-ink); }
  .rc-block p { margin: 0; font-size: 13.5px; }
  .rc-excerpt mark {
    background: var(--mark-rose);
    color: var(--mark-rose-ink);
    padding: 0.02em 0.15em;
    border-radius: 3px;
  }
  .rc-citation .ep-stamp {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10.5px;
    background: var(--mark-sky);
    color: var(--mark-sky-ink);
    border-radius: 5px;
    padding: 1px 6px;
    margin-right: 6px;
    vertical-align: middle;
  }

  .rc-connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .rc-connector::before, .rc-connector::after {
    content: "";
    width: 1px;
    flex: 1;
    background: var(--rule-strong);
  }
  .rc-connector .badge {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.1;
    flex-shrink: 0;
    background: var(--surface);
  }

  .rc-explain { font-size: 13px; color: var(--ink-muted); margin: 16px 2px 0; }

  /* ---------- secondary lists ---------- */
  .side-list { margin-top: 8px; }
  .side-row {
    display: flex;
    gap: 10px;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 13px;
  }
  .side-row:last-child { border-bottom: none; }
  .side-row .rc-tag { flex-shrink: 0; }
  .side-row .txt { color: var(--ink-muted); }
  .side-row .ep { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); margin-left: auto; flex-shrink: 0; }

  details.side-block {
    margin-top: 30px;
    border-top: 1px solid var(--rule);
    padding-top: 18px;
  }
  details.side-block summary {
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    list-style: none;
  }
  details.side-block summary::-webkit-details-marker { display: none; }
  details.side-block summary::before { content: "▸ "; color: var(--ink-muted); }
  details.side-block[open] summary::before { content: "▾ "; }

  @media (max-width: 620px) {
    header { padding: 18px 20px; }
    main { padding: 40px 18px 90px; }
    h1 { font-size: 27px; }
    .rc-body { grid-template-columns: 1fr; }
    .rc-connector { flex-direction: row; padding: 10px 0; }
    .rc-connector::before, .rc-connector::after { height: 1px; width: auto; flex: 1; }
    .summary-strip { flex-wrap: wrap; gap: 16px 24px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">
    <span class="glyph">결</span>
    <span class="tagline">이야기의 결을 기억합니다</span>
  </div>
  <nav>
    <a href="/">원고 접수</a>
    <a href="/report" class="active">정합성 리포트</a>
  </nav>
</header>

<main>
  <div class="eyebrow">02 · 정합성 검사</div>
  <h1>새 회차를 그동안의<br />이야기에 비춰봅니다</h1>
  <p class="lede">
    새로 쓴 회차를 올리면, 정확히 어느 표현이 어떤 기존 설정과 어긋나는지, 그리고 왜
    어긋나는지를 짚어 보여드립니다.
  </p>

  <div class="panel">
    <div class="file-slot" id="fileSlot" role="button" tabindex="0" aria-label="검사할 회차 파일 선택">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" stroke-linejoin="round" />
        <path d="M14 3v5h5" stroke-linejoin="round" />
      </svg>
      <span id="fileSlotText">검사할 새 회차 파일을 선택하세요 (.txt)</span>
      <input type="file" id="fileInput" accept=".txt" />
    </div>
    <button class="primary" id="startBtn" disabled>검사 시작</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-caption" id="progressCaption">대기 중...</div>
  </div>

  <div class="report" id="report">
    <div class="summary-strip">
      <div class="summary-item flag"><div class="num">3</div><div class="label">모순 발견</div></div>
      <div class="summary-item ok"><div class="num">6</div><div class="label">확인됨</div></div>
      <div class="summary-item unk"><div class="num">1</div><div class="label">확인 불가</div></div>
    </div>

    <h2 class="section-title">발견된 모순</h2>
    <div id="cardList"></div>

    <details class="side-block">
      <summary>확인됨 — 기존 설정과 어긋나지 않음 (6건)</summary>
      <div class="side-list" id="okList"></div>
    </details>

    <details class="side-block">
      <summary>확인 불가 — 근거 부족 (1건)</summary>
      <div class="side-list" id="unkList"></div>
    </details>
  </div>
</main>

<script>
  const fileSlot = document.getElementById("fileSlot");
  const fileSlotText = document.getElementById("fileSlotText");
  const fileInput = document.getElementById("fileInput");
  const startBtn = document.getElementById("startBtn");
  const progressWrap = document.getElementById("progressWrap");
  const progressFill = document.getElementById("progressFill");
  const progressCaption = document.getElementById("progressCaption");
  const report = document.getElementById("report");
  const cardList = document.getElementById("cardList");
  const okList = document.getElementById("okList");
  const unkList = document.getElementById("unkList");

  let selectedFile = null;

  fileSlot.addEventListener("click", () => fileInput.click());
  fileSlot.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      fileInput.click();
    }
  });
  fileInput.addEventListener("change", (e) => setFile(e.target.files[0]));
  ["dragenter", "dragover"].forEach((evt) =>
    fileSlot.addEventListener(evt, (e) => { e.preventDefault(); fileSlot.classList.add("dragover"); })
  );
  ["dragleave", "drop"].forEach((evt) =>
    fileSlot.addEventListener(evt, (e) => { e.preventDefault(); fileSlot.classList.remove("dragover"); })
  );
  fileSlot.addEventListener("drop", (e) => setFile(e.dataTransfer.files[0]));

  function setFile(f) {
    if (!f) return;
    selectedFile = f;
    fileSlotText.textContent = f.name;
    fileSlot.classList.add("has-file");
    startBtn.disabled = false;
    report.classList.remove("show");
  }

  function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

  // ---- mock 데이터 (실제 검사 파이프라인과 나중에 교체될 자리) ----
  const MOCK = {
    contradictions: [
      {
        category: "생사",
        excerptBefore: "그날 ",
        highlight: "정희원의 칼끝을 피해 용케 목숨을 건진",
        excerptAfter: " 그는, 상처투성이 몸을 이끌고 이곳까지 몰래 뒤따라온 것이었다.",
        sourceEpisode: 6,
        fact: "정희원이 철두파를 도륙하는 과정에서 천인호의 얼굴을 정수리부터 아래로 꿰뚫어 살해했다.",
        explain: "천인호는 6화 전투에서 이미 사망한 것으로 확인되어, 이후 살아서 등장했다는 서술과 양립할 수 없습니다.",
      },
      {
        category: "소유물",
        excerptBefore: "이현성은 허리춤에 매달린 ",
        highlight: "'부러지지 않는 신념'",
        excerptAfter: "을 슬쩍 매만졌다.",
        sourceEpisode: 6,
        fact: "'부러지지 않는 신념'은 6화에서 김독자가 랜덤 아이템 박스를 통해 얻은 성유물이다.",
        explain: "이 성유물의 소유자는 김독자로 확인되어, 이현성이 지니고 있다는 서술과 어긋납니다.",
      },
      {
        category: "장소",
        excerptBefore: "[두 번째 메인 시나리오 - 조우]의 목적지는 ",
        highlight: "종로3가",
        excerptAfter: "로 표시되어 있었다.",
        sourceEpisode: 6,
        fact: "두 번째 메인 시나리오 '조우'의 다음 거점은 시스템 메시지로 '충무로'라 명시된다.",
        explain: "같은 시나리오의 목적지가 원문에서는 충무로로 지정되어 있어, 종로3가라는 서술과 양립할 수 없습니다.",
      },
    ],
    consistent: [
      { category: "장소", text: "충무로 입구에 다다르자 이지혜가 무심한 얼굴로 일행을 맞았다.", sourceEpisode: 6 },
      { category: "관계", text: "한명오가 예전에 유상아의 자전거를 몰래 가져간 일이 다시 언급되었다.", sourceEpisode: 5 },
      { category: "능력", text: "정희원의 안광이 가라앉으며 평소 모습으로 돌아왔다.", sourceEpisode: 6 },
      { category: "생사", text: "\"천인호였다.\"", sourceEpisode: 6 },
      { category: "관계", text: "이현성이 정희원 쪽을 멍하니 바라보다 놀라는 모습을 보였다.", sourceEpisode: 6 },
      { category: "소유물", text: "그 성유물은 랜덤 아이템 박스에서 나온 것이었다.", sourceEpisode: 6 },
    ],
    unknown: [
      { category: "시점/순서", text: "\"한강에서 어룡을 같이 처리했을 때도 그랬지.\"" },
    ],
  };

  function buildExcerptHTML(item) {
    return `${item.excerptBefore}<mark>${item.highlight}</mark>${item.excerptAfter}`;
  }

  function renderReport() {
    cardList.innerHTML = "";
    MOCK.contradictions.forEach((item, i) => {
      const card = document.createElement("article");
      card.className = "redline-card";
      card.style.animationDelay = i * 90 + "ms";
      card.innerHTML = `
        <div class="rc-head">
          <span class="rc-tag">${item.category}</span>
          <span class="rc-stamp">근거 ${item.sourceEpisode}화</span>
        </div>
        <div class="rc-body">
          <div class="rc-block rc-excerpt">
            <div class="rc-label">신규 원고</div>
            <p>${buildExcerptHTML(item)}</p>
          </div>
          <div class="rc-connector">
            <span class="badge">모순</span>
          </div>
          <div class="rc-block rc-citation">
            <div class="rc-label">기존 설정 근거</div>
            <p><span class="ep-stamp">${item.sourceEpisode}화</span>${item.fact}</p>
          </div>
        </div>
        <p class="rc-explain">${item.explain}</p>
      `;
      cardList.appendChild(card);
    });

    okList.innerHTML = "";
    MOCK.consistent.forEach((item) => {
      const row = document.createElement("div");
      row.className = "side-row";
      row.innerHTML = `<span class="rc-tag">${item.category}</span><span class="txt">${item.text}</span><span class="ep">${item.sourceEpisode}화</span>`;
      okList.appendChild(row);
    });

    unkList.innerHTML = "";
    MOCK.unknown.forEach((item) => {
      const row = document.createElement("div");
      row.className = "side-row";
      row.innerHTML = `<span class="rc-tag">${item.category}</span><span class="txt">${item.text}</span>`;
      unkList.appendChild(row);
    });
  }

  async function runCheck() {
    startBtn.disabled = true;
    fileSlot.style.pointerEvents = "none";
    report.classList.remove("show");
    progressWrap.classList.add("show");
    progressFill.style.width = "0%";

    const steps = [
      { pct: 18, text: "원고를 읽는 중..." },
      { pct: 42, text: "1~6화와 대조하는 중..." },
      { pct: 68, text: "인물·아이템 관계를 확인하는 중..." },
      { pct: 90, text: "표현을 다시 살펴보는 중..." },
      { pct: 100, text: "리포트를 정리하는 중..." },
    ];
    for (const step of steps) {
      progressFill.style.width = step.pct + "%";
      progressCaption.textContent = step.text;
      await sleep(480 + Math.random() * 260);
    }

    renderReport();
    await sleep(150);
    progressWrap.classList.remove("show");
    report.classList.add("show");

    startBtn.disabled = false;
    startBtn.textContent = "다시 검사";
    fileSlot.style.pointerEvents = "auto";
  }

  startBtn.addEventListener("click", runCheck);
</script>
</body>
</html>
